# Self-contained local development infrastructure for the Kuvox API ALONE.
# The API itself is NOT started here — run `make watch` (or `dotnet watch run`) for that.
#
# Postgres is owned exclusively by this service (the ai-service has no DB access).
# Redis / RabbitMQ / MinIO are also provided here so the API can be developed
# standalone without the ai-service repo checked out.
#
# >>> If you develop BOTH api/ and ai-service/ together, do NOT run this file. <<<
# Use the workspace-root docker-compose.yml (`cd .. && make up`) instead — it brings up
# a single shared infra set. This file and the ai-service compose both publish Redis
# (6379), RabbitMQ (5672/15672) and MinIO (9000/9001), so running more than one infra
# set at once collides on those host ports. Run exactly one set, never two.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: kuvox
      POSTGRES_PASSWORD: kuvox
      POSTGRES_DB: kuvox
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kuvox -d kuvox"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:
  minio-data:
