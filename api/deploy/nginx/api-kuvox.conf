# Nginx reverse proxy for the Kuvox API.
# Install on the Droplet at: /etc/nginx/sites-available/api-kuvox.conf
# Then: sudo ln -s /etc/nginx/sites-available/api-kuvox.conf /etc/nginx/sites-enabled/
#
# NOTE: the public host is a SINGLE-level subdomain (api-kuvox.linkednodedigital.com),
# so it is covered by Cloudflare's Universal SSL wildcard *.linkednodedigital.com. The
# earlier two-level name (api.kuvox.linkednodedigital.com) was NOT covered, which broke
# the TLS handshake at the Cloudflare edge once the record was proxied.
#
# This file is the HTTP-only starting point. Run certbot (see README/notes) and
# it will inject the TLS (listen 443) server block and an HTTP->HTTPS redirect.

server {
    listen 80;
    listen [::]:80;
    server_name api-kuvox.linkednodedigital.com;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (frontend real-time updates).
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 300s;
    }
}
