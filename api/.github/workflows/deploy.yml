name: Deploy

on:
  # CD is PAUSED — there is no remote host to deploy to (the DigitalOcean Droplet was
  # destroyed; the API now runs locally on a Mac via `make watch` + a Cloudflare Tunnel).
  # The workflow is kept but made manual-only (Actions tab → "Run workflow"). To resume
  # automatic deploys, restore the `push:` trigger below and re-point the DROPLET_* repo
  # secrets/variables (or switch to a self-hosted runner).
  workflow_dispatch:
  push:
    branches: [develop, main]

env:
  COMPOSE_FILE: docker-compose.prod.yml

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "tag=latest" >> "$GITHUB_OUTPUT"
            echo "env=production" >> "$GITHUB_OUTPUT"
          else
            echo "tag=develop" >> "$GITHUB_OUTPUT"
            echo "env=staging" >> "$GITHUB_OUTPUT"
          fi

      - name: Set lowercase image name
        id: img
        env:
          OWNER: ${{ github.repository_owner }}
        run: echo "name=ghcr.io/${OWNER,,}/kuvox-api" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.img.outputs.name }}:${{ steps.tag.outputs.tag }}
            ${{ steps.img.outputs.name }}:${{ github.sha }}

      - name: Deploy to Droplet
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.DROPLET_HOST }}
          username: ${{ vars.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            cd /opt/kuvox
            docker compose -f docker-compose.prod.yml pull kuvox-api
            docker compose -f docker-compose.prod.yml up -d kuvox-api
            docker image prune -f
